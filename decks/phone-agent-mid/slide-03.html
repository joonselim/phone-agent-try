<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', sans-serif;
      background: #0A0A0A;
      padding: 40pt 48pt;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <!-- 헤더 -->
  <div style="display: flex; align-items: center; gap: 12pt; margin-bottom: 28pt;">
    <p style="display: inline-block; padding: 4pt 12pt; background: #3B82F6; color: #ffffff; border-radius: 4pt; font-size: 8pt; font-weight: 700; letter-spacing: 0.05em;">SOLUTION</p>
    <h2 style="font-size: 24pt; font-weight: 600; color: #ffffff;">딸깍으로 에이전트에게 맡기세요</h2>
  </div>

  <!-- 핵심 흐름 -->
  <div style="flex: 1; display: flex; flex-direction: column; gap: 24pt;">
    <!-- 한 문장 정의 -->
    <div style="text-align: center; padding: 16pt 0;">
      <p style="font-size: 18pt; color: #ffffff; font-weight: 500; line-height: 1.5;">
        자연어로 말하면 → AI가 <span style="color: #3B82F6; font-weight: 700;">실제 모바일 앱</span>을 직접 조작해서 거래를 완결
      </p>
    </div>

    <!-- 아키텍처 플로우 -->
    <div style="display: flex; align-items: center; justify-content: center; gap: 8pt;">
      <div style="background: #161616; border-radius: 8pt; padding: 14pt 18pt; text-align: center;">
        <p style="font-size: 9pt; color: #888888; margin-bottom: 4pt;">USER</p>
        <p style="font-size: 12pt; color: #ffffff; font-weight: 500;">"배달 시켜줘"</p>
      </div>
      <p style="font-size: 16pt; color: #3B82F6;">→</p>
      <div style="background: #161616; border-radius: 8pt; padding: 14pt 18pt; text-align: center;">
        <p style="font-size: 9pt; color: #888888; margin-bottom: 4pt;">INTENT PARSER</p>
        <p style="font-size: 12pt; color: #ffffff; font-weight: 500;">Claude LLM</p>
      </div>
      <p style="font-size: 16pt; color: #3B82F6;">→</p>
      <div style="background: #161616; border-radius: 8pt; padding: 14pt 18pt; text-align: center;">
        <p style="font-size: 9pt; color: #888888; margin-bottom: 4pt;">ROUTER</p>
        <p style="font-size: 12pt; color: #ffffff; font-weight: 500;">서비스 선택</p>
      </div>
      <p style="font-size: 16pt; color: #3B82F6;">→</p>
      <div style="background: #1a2744; border: 1pt solid #3B82F6; border-radius: 8pt; padding: 14pt 18pt; text-align: center;">
        <p style="font-size: 9pt; color: #3B82F6; margin-bottom: 4pt;">ANDROID</p>
        <p style="font-size: 12pt; color: #ffffff; font-weight: 500;">앱 자동 제어</p>
      </div>
    </div>

    <!-- 차별점 -->
    <div style="display: flex; gap: 20pt; margin-top: auto;">
      <div style="flex: 1; background: #161616; border-radius: 8pt; padding: 16pt;">
        <p style="font-size: 10pt; color: #3B82F6; font-weight: 600; margin-bottom: 6pt;">차별점</p>
        <p style="font-size: 12pt; color: #cccccc; line-height: 1.5;">브라우저가 아닌 <span style="color: #ffffff; font-weight: 600;">실제 모바일 앱</span> 직접 제어. 한국 서비스 대부분이 모바일 전용인 문제를 정면 돌파.</p>
      </div>
      <div style="flex: 1; background: #161616; border-radius: 8pt; padding: 16pt;">
        <p style="font-size: 10pt; color: #3B82F6; font-weight: 600; margin-bottom: 6pt;">핵심 스택</p>
        <p style="font-size: 12pt; color: #cccccc; line-height: 1.5;">Python + <span style="color: #ffffff; font-weight: 600;">Droidrun SDK</span> + Android Emulator + ADB로 실기기/에뮬레이터 모두 지원.</p>
      </div>
    </div>
  </div>
</body>
</html>
