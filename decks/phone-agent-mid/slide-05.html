<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', sans-serif;
      background: #0A0A0A;
      padding: 40pt 48pt;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <!-- 헤더 -->
  <div style="display: flex; align-items: center; gap: 12pt; margin-bottom: 32pt;">
    <p style="display: inline-block; padding: 4pt 12pt; background: #3B82F6; color: #ffffff; border-radius: 4pt; font-size: 8pt; font-weight: 700; letter-spacing: 0.05em;">DEMO</p>
    <h2 style="font-size: 24pt; font-weight: 600; color: #ffffff;">실제 시연 — 2개 시나리오</h2>
  </div>

  <!-- 2개 데모 카드 -->
  <div style="flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 24pt;">
    <!-- 카카오T -->
    <div style="background: #161616; border-radius: 10pt; padding: 28pt; display: flex; flex-direction: column; justify-content: space-between; border-top: 3pt solid #8B5CF6;">
      <div>
        <p style="font-size: 32pt; margin-bottom: 14pt;">🚕</p>
        <h3 style="font-size: 20pt; font-weight: 600; color: #ffffff; margin-bottom: 10pt;">카카오T</h3>
        <p style="font-size: 13pt; color: #888888; line-height: 1.7;">목적지 설정 → 택시 호출 → 배차 대기 → 취소까지 AI 에이전트가 앱 내에서 자동 수행</p>
      </div>
    </div>

    <!-- 배달의민족 -->
    <div style="background: #161616; border-radius: 10pt; padding: 28pt; display: flex; flex-direction: column; justify-content: space-between; border-top: 3pt solid #10B981;">
      <div>
        <p style="font-size: 32pt; margin-bottom: 14pt;">🍔</p>
        <h3 style="font-size: 20pt; font-weight: 600; color: #ffffff; margin-bottom: 10pt;">배달의민족</h3>
        <p style="font-size: 13pt; color: #888888; line-height: 1.7;">음식 선택 → 장바구니 → 주문 → 취소까지 AI 에이전트가 앱 내에서 자동 수행</p>
      </div>
    </div>
  </div>

  <!-- 하단 노트 -->
  <div style="margin-top: 16pt;">
    <p style="font-size: 10pt; color: #555555;">모든 시나리오는 실제 앱에서 AI 에이전트가 자율적으로 수행한 영상입니다.</p>
  </div>
</body>
</html>
