<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', sans-serif;
      background: #0A0A0A;
      padding: 40pt 48pt;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <!-- 헤더 -->
  <div style="display: flex; align-items: center; gap: 12pt; margin-bottom: 28pt;">
    <p style="display: inline-block; padding: 4pt 12pt; background: #3B82F6; color: #ffffff; border-radius: 4pt; font-size: 8pt; font-weight: 700; letter-spacing: 0.05em;">PROBLEM</p>
    <h2 style="font-size: 24pt; font-weight: 600; color: #ffffff;">한국 앱은 AI가 못 건드린다</h2>
  </div>

  <!-- 본문 -->
  <div style="flex: 1; display: flex; gap: 32pt;">
    <!-- 좌측: 핵심 문제 -->
    <div style="flex: 1; display: flex; flex-direction: column; gap: 20pt;">
      <div style="background: #161616; border-radius: 10pt; padding: 20pt; border-left: 3pt solid #3B82F6;">
        <p style="font-size: 10pt; color: #3B82F6; font-weight: 600; margin-bottom: 8pt;">글로벌 에이전트의 한계</p>
        <p style="font-size: 13pt; color: #cccccc; line-height: 1.6;">OpenClaw, Operator 같은 AI 에이전트는 <span style="color: #ffffff; font-weight: 600;">한국 모바일 앱에 접근할 수 없다.</span> 배민, 카카오T, 캐치테이블 — 전부 앱 전용.</p>
      </div>
      <div style="background: #161616; border-radius: 10pt; padding: 20pt; border-left: 3pt solid #EF4444;">
        <p style="font-size: 10pt; color: #EF4444; font-weight: 600; margin-bottom: 8pt;">매일 반복되는 수작업</p>
        <p style="font-size: 13pt; color: #cccccc; line-height: 1.6;">택시 호출, 배달 주문, 식당 예약 — <span style="color: #ffffff; font-weight: 600;">매일</span> 앱을 열고, 검색하고, 탭하고, 결제한다.</p>
      </div>
    </div>

    <!-- 우측: 구체적 사례 -->
    <div style="flex: 1; display: flex; flex-direction: column; justify-content: center;">
      <div style="background: #161616; border-radius: 10pt; padding: 24pt;">
        <p style="font-size: 10pt; color: #888888; font-weight: 600; margin-bottom: 12pt; letter-spacing: 0.05em;">REAL CASE</p>
        <p style="font-size: 15pt; color: #ffffff; font-weight: 500; line-height: 1.5; margin-bottom: 16pt;">"팀끼리 배달음식 시킬 때"</p>
        <ul style="list-style: none; display: flex; flex-direction: column; gap: 8pt;">
          <li style="font-size: 12pt; color: #888888; padding-left: 16pt; position: relative;"><span style="position: absolute; left: 0; color: #555555;">1.</span> 메뉴 수합</li>
          <li style="font-size: 12pt; color: #888888; padding-left: 16pt; position: relative;"><span style="position: absolute; left: 0; color: #555555;">2.</span> 앱 열기</li>
          <li style="font-size: 12pt; color: #888888; padding-left: 16pt; position: relative;"><span style="position: absolute; left: 0; color: #555555;">3.</span> 하나하나 장바구니에 담기</li>
          <li style="font-size: 12pt; color: #ffffff; font-weight: 600; padding-left: 16pt; position: relative;"><span style="position: absolute; left: 0; color: #EF4444;">4.</span> 결제까지 수작업</li>
        </ul>
      </div>
    </div>
  </div>
</body>
</html>
